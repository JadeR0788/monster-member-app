<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Two-Range Random Number Picker</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; max-width: 720px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin: 14px 0; }
    label { display: block; margin: 10px 0 6px; font-weight: 600; }
    input, select, button { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; }
    button { cursor: pointer; border: none; margin-top: 14px; font-weight: 700; }
    button.primary { background: #111; color: white; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .result { font-size: 28px; font-weight: 800; margin-top: 10px; }
    .sub { color: #666; margin-top: 6px; }
    .err { color: #b00020; font-weight: 700; margin-top: 10px; }
    .pill { display:inline-block; padding: 3px 10px; border-radius: 999px; background:#f3f3f3; margin-top:10px; }
  </style>
</head>
<body>
  <h1>Two-Range Random Number Picker</h1>
  <p class="sub">Pick a random number from <b>either</b> of two ranges (or one from each).</p>

  <div class="card">
    <label>Mode</label>
    <select id="mode">
      <option value="either">Pick ONE number from either Range A or Range B</option>
      <option value="each">Pick ONE number from Range A AND ONE from Range B</option>
    </select>

    <div class="pill">Range A</div>
    <div class="row">
      <div>
        <label for="aMin">Min</label>
        <input id="aMin" type="number" value="1001" />
      </div>
      <div>
        <label for="aMax">Max</label>
        <input id="aMax" type="number" value="12000" />
      </div>
    </div>

    <div class="pill">Range B</div>
    <div class="row">
      <div>
        <label for="bMin">Min</label>
        <input id="bMin" type="number" value="30000" />
      </div>
      <div>
        <label for="bMax">Max</label>
        <input id="bMax" type="number" value="60000" />
      </div>
    </div>

    <button class="primary" id="pickBtn">🎲 Pick Random</button>

    <div id="error" class="err" style="display:none;"></div>
    <div id="output" class="result"></div>
    <div id="output2" class="result"></div>
    <div id="meta" class="sub"></div>
  </div>

  <script>
    // Inclusive random integer in [min, max]
    function randInt(min, max) {
      // crypto for better randomness (falls back to Math.random if unavailable)
      const range = max - min + 1;
      if (range <= 0) throw new Error("Invalid range");
      if (window.crypto && window.crypto.getRandomValues) {
        // Avoid modulo bias using rejection sampling
        const maxUint = 0xFFFFFFFF;
        const limit = maxUint - (maxUint % range);
        const buf = new Uint32Array(1);
        let x;
        do {
          window.crypto.getRandomValues(buf);
          x = buf[0];
        } while (x >= limit);
        return min + (x % range);
      }
      return Math.floor(Math.random() * range) + min;
    }

    function parseRange(minEl, maxEl, name) {
      const min = Number(minEl.value);
      const max = Number(maxEl.value);
      if (!Number.isInteger(min) || !Number.isInteger(max)) {
        throw new Error(`${name}: Min and Max must be integers.`);
      }
      if (min > max) {
        throw new Error(`${name}: Min cannot be greater than Max.`);
      }
      return { min, max };
    }

    const modeEl = document.getElementById("mode");
    const aMinEl = document.getElementById("aMin");
    const aMaxEl = document.getElementById("aMax");
    const bMinEl = document.getElementById("bMin");
    const bMaxEl = document.getElementById("bMax");
    const pickBtn = document.getElementById("pickBtn");
    const errorEl = document.getElementById("error");
    const out1 = document.getElementById("output");
    const out2 = document.getElementById("output2");
    const meta = document.getElementById("meta");

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = "block";
    }
    function clearError() {
      errorEl.textContent = "";
      errorEl.style.display = "none";
    }

    pickBtn.addEventListener("click", () => {
      clearError();
      out1.textContent = "";
      out2.textContent = "";
      meta.textContent = "";

      try {
        const A = parseRange(aMinEl, aMaxEl, "Range A");
        const B = parseRange(bMinEl, bMaxEl, "Range B");
        const mode = modeEl.value;

        if (mode === "each") {
          const aPick = randInt(A.min, A.max);
          const bPick = randInt(B.min, B.max);
          out1.textContent = `A: ${aPick}`;
          out2.textContent = `B: ${bPick}`;
          meta.textContent = `Picked one from each range (inclusive).`;
          return;
        }

        // mode === "either": pick from either range with probability weighted by how many integers are in each range
        const sizeA = (A.max - A.min + 1);
        const sizeB = (B.max - B.min + 1);
        const total = sizeA + sizeB;

        // Choose which range to draw from (weighted)
        const ticket = randInt(1, total);
        const chosen = (ticket <= sizeA) ? "A" : "B";
        const pick = (chosen === "A") ? randInt(A.min, A.max) : randInt(B.min, B.max);

        out1.textContent = pick.toString();
        meta.textContent = `Picked from Range ${chosen} (weighted by range sizes).`;
      } catch (e) {
        showError(e.message || String(e));
      }
    });
  </script>
</body>
</html>
